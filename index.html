<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amaan Bukhari</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Space+Mono&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Mono', monospace;
      background: #141312;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem 4rem;
    }

    .wrap {
      width: 100%;
      max-width: 420px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #252320;
      border: 1.5px solid #C4ABEE;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: #C4ABEE;
      margin: 0 auto 1rem;
    }

    .name {
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #F7F6F5;
      text-align: center;
      margin-bottom: 4px;
    }

    .title {
      font-size: 10px;
      color: #9A9590;
      text-align: center;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .divider {
      font-size: 9px;
      color: #615D59;
      text-align: center;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 1.2rem 0 0.8rem;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #252320;
      border: 1px solid #2e2c29;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 10px;
      text-decoration: none;
      color: #D5D2CE;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }

    .link:hover {
      border-color: #C4ABEE;
      background: #2a2826;
      transform: translateY(-1px);
    }

    .link:active { transform: translateY(0); }

    .icon {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 17px;
      overflow: hidden;
    }

    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 9px;
    }

    .text { flex: 1; }

    .label {
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      display: block;
      color: #F7F6F5;
    }

    .sub {
      font-size: 10px;
      color: #615D59;
      display: block;
      margin-top: 2px;
    }

    .arrow { color: #615D59; font-size: 13px; }

    .ic-li { background: #0A66C2; color: #fff; }
    .ic-gh { background: #3a3f44; color: #D5D2CE; }
    .ic-em { background: #EA4335; color: #fff; }
    .ic-re { background: #8B5CF6; color: #fff; font-size: 15px; }
    .ic-pr { background: #1e1c1a; border: 1px solid #C4ABEE; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="avatar">AB</div>
    <p class="name">Amaan Bukhari</p>
    <p class="title">IT &amp; Cybersecurity &middot; CompTIA Sec+ &middot; NJIT &rsquo;26</p>

    <p class="divider">Connect</p>

    <a class="link" href="https://www.linkedin.com/in/amaanbukhari/" target="_blank" rel="noopener">
      <div class="icon ic-li"><i class="fa-brands fa-linkedin-in"></i></div>
      <div class="text">
        <span class="label">LinkedIn</span>
        <span class="sub">linkedin.com/in/amaanbukhari</span>
      </div>
      <i class="fa-solid fa-arrow-right arrow"></i>
    </a>

    <a class="link" href="mailto:amaanjbukhari@gmail.com">
      <div class="icon ic-em"><i class="fa-solid fa-envelope"></i></div>
      <div class="text">
        <span class="label">Email</span>
        <span class="sub">amaanjbukhari@gmail.com</span>
      </div>
      <i class="fa-solid fa-arrow-right arrow"></i>
    </a>

    <a class="link" href="https://github.com/amaanbukhari" target="_blank" rel="noopener">
      <div class="icon ic-gh"><i class="fa-brands fa-github"></i></div>
      <div class="text">
        <span class="label">GitHub</span>
        <span class="sub">github.com/amaanbukhari</span>
      </div>
      <i class="fa-solid fa-arrow-right arrow"></i>
    </a>

    <p class="divider">Work &amp; Resume</p>

    <a class="link" href="https://pristia.net" target="_blank" rel="noopener">
      <div class="icon ic-pr"><img src="pristia-icon.jpg" alt="Pristia Group" /></div>
      <div class="text">
        <span class="label">Pristia Group</span>
        <span class="sub">pristia.net</span>
      </div>
      <i class="fa-solid fa-arrow-right arrow"></i>
    </a>

    <a class="link" href="https://amaanbukhari.github.io/Amaan_Bukhari_Resume.pdf" target="_blank" rel="noopener">
      <div class="icon ic-re"><i class="fa-solid fa-file-lines"></i></div>
      <div class="text">
        <span class="label">Resume</span>
        <span class="sub">Download PDF</span>
      </div>
      <i class="fa-solid fa-arrow-right arrow"></i>
    </a>
  </div>
</body>
</html>
